<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>eKart — AI Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">

<script>
;(function(){
  var dark = localStorage.getItem('ekart_theme') === 'dark';
  if(dark) document.documentElement.setAttribute('data-theme','dark');
  document.documentElement.style.background = dark ? '#07080D' : '#F2F3F9';
})();
</script>
<script src="api.js"></script>
<script src="shared.js"></script>
<script src="nav.js"></script>

<style>
/* ── Skeleton — chat-specific layout ────────────────────────── */
.skel-body{
  flex:1; padding:16px 20px; overflow:hidden;
  display:grid; grid-template-columns:1fr 380px; gap:16px;
}
.skel-chat-col{display:flex;flex-direction:column;gap:0}
.skel-chat-panel{
  flex:1;background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r-lg);overflow:hidden;display:flex;flex-direction:column;
}
.skel-chat-hdr{
  height:66px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:12px;padding:0 18px;flex-shrink:0;
}
.skel-chat-msgs{flex:1;padding:20px;display:flex;flex-direction:column;gap:14px}
.skel-msg-row{display:flex;align-items:flex-end;gap:10px}
.skel-msg-row.user{flex-direction:row-reverse}
.skel-chat-footer{
  height:72px;border-top:1px solid var(--border);
  padding:14px;display:flex;align-items:center;gap:8px;flex-shrink:0;
}
.skel-action-col{
  background:var(--surface);border:1px dashed var(--border-md);
  border-radius:var(--r-lg);
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:12px;padding:40px 28px;
}
@media(max-width:900px){
  #page-skeleton{left:0;top:56px}
  .skel-body{grid-template-columns:1fr}
  .skel-action-col{display:none}
}

/* ── Content area ────────────────────────────────────────────── */
.content{
  flex:1;padding:16px 20px;background:var(--bg);
  min-width:0;display:flex;flex-direction:column;
}

/* ── AI root layout ──────────────────────────────────────────── */
.ai-root{
  display:grid;grid-template-columns:1fr 388px;gap:16px;
  flex:1;min-height:0;height:calc(100vh - 60px - 32px);
}

/* ── Chat panel ──────────────────────────────────────────────── */
.chat-panel{
  display:flex;flex-direction:column;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r-lg);overflow:hidden;
  box-shadow:var(--sh-sm);transition:border-color .2s,box-shadow .2s;
  position:relative;min-height:0;
}
.chat-panel:focus-within{
  border-color:rgba(124,111,255,.25);
  box-shadow:var(--sh),0 0 0 1px var(--accent-dim);
}
.chat-header{
  padding:14px 18px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:12px;flex-shrink:0;
  background:linear-gradient(135deg,var(--accent-soft) 0%,transparent 60%);
}
.chat-header-avatar{
  width:40px;height:40px;
  background:linear-gradient(135deg,var(--accent),#a78bfa);
  border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;
  font-size:19px;flex-shrink:0;box-shadow:0 0 18px var(--accent-glow);
}
.chat-header-info h2{font-size:13.5px;font-weight:800;letter-spacing:-.02em;color:var(--text)}
.chat-header-info p{font-size:11px;color:var(--text-3);margin-top:1px}
.chat-status-dot{
  width:8px;height:8px;border-radius:50%;background:var(--green);
  box-shadow:0 0 7px var(--green);margin-left:auto;flex-shrink:0;position:relative;
}
.chat-status-dot::after{
  content:'';position:absolute;inset:0;border-radius:50%;
  background:var(--green);animation:statusRing 2s ease-out infinite;
}
@keyframes statusRing{0%{transform:scale(1);opacity:.7}70%{transform:scale(2.4);opacity:0}100%{transform:scale(2.4);opacity:0}}

/* ── Messages ────────────────────────────────────────────────── */
.chat-messages{
  flex:1;overflow-y:auto;padding:20px;
  display:flex;flex-direction:column;gap:16px;
  scroll-behavior:smooth;transition:opacity .2s ease;min-height:0;
}
.chat-messages::-webkit-scrollbar{width:4px}
.chat-messages::-webkit-scrollbar-thumb{background:var(--border-md);border-radius:4px}
.chat-messages.store-switching{opacity:.3;pointer-events:none}
.msg{display:flex;gap:10px;align-items:flex-end;animation:msgIn .25s ease both}
@keyframes msgIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse}
.msg-avatar{
  width:28px;height:28px;border-radius:var(--r-sm);
  display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;
}
.msg.ai   .msg-avatar{background:linear-gradient(135deg,var(--accent),#a78bfa);box-shadow:0 2px 8px var(--accent-glow)}
.msg.user .msg-avatar{background:var(--surface-3);border:1px solid var(--border-md);font-size:11px;font-weight:800;color:var(--text-2)}
.msg-bubble{
  max-width:76%;padding:11px 15px;
  border-radius:var(--r);font-size:13.5px;line-height:1.65;
  color:var(--text);word-break:break-word;
}
.msg.ai .msg-bubble{
  background:var(--surface-2);border:1px solid var(--border);
  border-bottom-left-radius:4px;
}
.msg.user .msg-bubble{
  background:linear-gradient(135deg,var(--accent),#7c73ff);color:#fff;
  border-bottom-right-radius:4px;box-shadow:0 3px 12px var(--accent-glow);
}
.msg-bubble strong{color:var(--accent-2);font-weight:700}
.msg.user .msg-bubble strong{color:rgba(255,255,255,.9)}
.typing-dots{display:flex;gap:4px;align-items:center;padding:4px 2px}
.typing-dots span{width:6px;height:6px;border-radius:50%;background:var(--text-3);animation:blink 1.2s ease infinite}
.typing-dots span:nth-child(2){animation-delay:.2s}
.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.25}40%{opacity:1}}

/* ── Quick chips ─────────────────────────────────────────────── */
.quick-chips{
  display:flex;flex-wrap:wrap;gap:7px;padding:8px 18px 4px;
  transition:opacity .2s ease;flex-shrink:0;
}
.quick-chips.store-switching{opacity:.3;pointer-events:none}
.chip{
  background:var(--surface-2);border:1px solid var(--border-md);
  border-radius:30px;padding:6px 14px;
  font-size:12px;font-weight:600;color:var(--text-2);
  cursor:pointer;transition:var(--t);font-family:var(--font);
  animation:chipIn .2s ease both;
}
@keyframes chipIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
.chip:hover{border-color:var(--accent);color:var(--accent-2);background:var(--accent-dim);transform:translateY(-1px)}

/* ── Input bar ───────────────────────────────────────────────── */
.chat-input-wrap{
  padding:12px 14px;border-top:1px solid var(--border);
  display:flex;gap:8px;align-items:flex-end;
  flex-shrink:0;background:var(--surface);transition:opacity .2s ease;
}
.chat-input-wrap.store-switching{opacity:.3;pointer-events:none}
.chat-input{
  flex:1;background:var(--surface-2);border:1px solid var(--border-md);
  border-radius:var(--r-sm);padding:11px 15px;
  font-size:13.5px;color:var(--text);font-family:var(--font);
  resize:none;max-height:120px;min-height:44px;line-height:1.5;
  transition:border-color .15s,box-shadow .15s;outline:none;
}
.chat-input:focus{
  border-color:rgba(124,111,255,.5);
  box-shadow:0 0 0 3px var(--accent-dim);background:var(--surface-3);
}
.chat-input::placeholder{color:var(--text-3)}
.chat-input.listening{
  border-color:rgba(239,68,68,.45)!important;
  background:rgba(239,68,68,.03)!important;
  box-shadow:0 0 0 3px rgba(239,68,68,.08)!important;
}
.chat-send-btn{
  width:44px;height:44px;border-radius:var(--r-sm);
  background:linear-gradient(135deg,var(--accent),#7c73ff);
  border:none;display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:18px;flex-shrink:0;
  transition:opacity .15s,transform .1s,box-shadow .15s;
  box-shadow:0 3px 12px var(--accent-glow);
}
.chat-send-btn:hover  {opacity:.88;box-shadow:0 5px 18px var(--accent-glow)}
.chat-send-btn:active {transform:scale(.94)}
.chat-send-btn:disabled{opacity:.38;cursor:not-allowed;box-shadow:none}

/* ── Language / mic tools ────────────────────────────────────── */
.input-tools{display:flex;gap:6px;align-items:flex-end;flex-shrink:0}
.chat-mic-btn-solo{
  width:44px;height:44px;border-radius:var(--r-sm);
  background:var(--surface-2);border:1px solid var(--border-md);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:18px;flex-shrink:0;transition:var(--t);
}
.chat-mic-btn-solo:hover  {border-color:rgba(124,111,255,.4);background:var(--accent-dim)}
.chat-mic-btn-solo:disabled{opacity:.35;cursor:not-allowed}
.chat-mic-btn-solo.recording{
  background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.55);
  animation:micGlow 1.2s ease-in-out infinite;
}
@keyframes micGlow{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.45)}50%{box-shadow:0 0 0 8px rgba(239,68,68,0)}}
.lang-wrap{position:relative;flex-shrink:0}
.lang-btn{
  height:44px;min-width:66px;padding:0 11px;border-radius:var(--r-sm);
  background:var(--surface-2);border:1px solid var(--border-md);
  display:flex;align-items:center;justify-content:center;gap:5px;
  cursor:pointer;font-size:12px;font-weight:700;color:var(--text-2);
  font-family:var(--font);transition:var(--t);white-space:nowrap;user-select:none;
}
.lang-btn:hover {border-color:rgba(124,111,255,.45);color:var(--accent-2);background:var(--accent-dim)}
.lang-btn.open  {border-color:rgba(124,111,255,.55);color:var(--accent-2);background:var(--accent-dim)}
.lang-btn .lb-flag{font-size:15px;line-height:1}
.lang-btn .lb-code{font-size:12px;font-weight:800;letter-spacing:.03em}
.lang-btn .lb-arrow{font-size:9px;opacity:.55;margin-left:1px;transition:transform .15s}
.lang-btn.open .lb-arrow{transform:rotate(180deg)}
.lang-btn.recording{border-color:rgba(239,68,68,.5);background:rgba(239,68,68,.07);color:#ef4444}
.rec-pulse{
  width:7px;height:7px;border-radius:50%;background:#ef4444;
  animation:recPulse 1s ease-in-out infinite;flex-shrink:0;display:none;
}
.lang-btn.recording .rec-pulse{display:block}
@keyframes recPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
.lang-dropdown{
  position:absolute;bottom:calc(100% + 8px);right:0;
  background:var(--surface);border:1px solid var(--border-md);
  border-radius:var(--r-lg);padding:8px 6px;
  min-width:210px;max-height:320px;overflow-y:auto;
  box-shadow:var(--sh-lg);z-index:9999;display:none;
}
.lang-dropdown::-webkit-scrollbar{width:3px}
.lang-dropdown::-webkit-scrollbar-thumb{background:var(--border-md);border-radius:3px}
.lang-dropdown.open{display:block;animation:ddFadeUp .15s ease}
@keyframes ddFadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.lang-dd-head{padding:4px 10px 8px;font-size:10px;font-weight:800;color:var(--text-3);text-transform:uppercase;letter-spacing:.08em}
.lang-dd-item{
  display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:9px;
  cursor:pointer;font-size:13px;font-weight:600;color:var(--text-2);transition:background .12s;
}
.lang-dd-item:hover {background:var(--surface-2);color:var(--text)}
.lang-dd-item.active{background:var(--accent-dim);color:var(--accent-2)}
.lang-dd-item .dd-flag {font-size:17px;flex-shrink:0}
.lang-dd-item .dd-name {flex:1}
.lang-dd-item .dd-check{font-size:13px;color:var(--accent);opacity:0}
.lang-dd-item.active .dd-check{opacity:1}
.lang-dd-sep{height:1px;background:var(--border);margin:5px 4px}

/* ── Store-switch overlay ─────────────────────────────────────── */
.store-switch-overlay{
  display:none;position:absolute;inset:0;
  background:rgba(255,255,255,.65);border-radius:var(--r-lg);
  z-index:100;align-items:center;justify-content:center;flex-direction:column;
  gap:10px;backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px);
}
[data-theme="dark"] .store-switch-overlay{background:rgba(12,14,22,.65)}
.store-switch-overlay.active{display:flex;animation:overlayIn .2s ease}
@keyframes overlayIn{from{opacity:0}to{opacity:1}}
.store-switch-spinner{
  width:32px;height:32px;border:3px solid var(--accent-dim);
  border-top-color:var(--accent);border-radius:50%;
  animation:storeSpin .7s linear infinite;
}
@keyframes storeSpin{to{transform:rotate(360deg)}}
.store-switch-label{font-size:12px;font-weight:600;color:var(--text-2)}

/* ── Action panel (DESKTOP) ──────────────────────────────────── */
.action-panel{
  display:flex;flex-direction:column;gap:0;
  overflow-y:auto;overflow-x:hidden;height:100%;padding-bottom:4px;
  transition:opacity .25s ease;
}
.action-panel::-webkit-scrollbar{width:4px}
.action-panel::-webkit-scrollbar-thumb{background:var(--border-md);border-radius:4px}
.action-panel.store-switching{opacity:.3;pointer-events:none}
.action-empty{
  background:var(--surface);border:1px dashed var(--border-md);
  border-radius:var(--r-lg);padding:44px 28px;
  text-align:center;color:var(--text-3);font-size:13px;line-height:1.7;
  box-shadow:var(--sh-sm);
}
.action-empty-icon{font-size:40px;margin-bottom:14px;opacity:.45}
.action-empty h3{font-size:13.5px;font-weight:700;color:var(--text-2);margin-bottom:6px}

/* ── Action card ─────────────────────────────────────────────── */
.action-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r-lg);overflow:visible;
  animation:acCardIn .3s ease both;transition:border-color .2s,box-shadow .2s;
  flex-shrink:0;box-shadow:var(--sh-sm);
}
.action-card:hover{border-color:rgba(124,111,255,.28);box-shadow:var(--sh)}
@keyframes acCardIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
.action-card-header{
  padding:14px 16px 12px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;
  background:linear-gradient(135deg,var(--accent-soft),transparent);
  border-radius:var(--r-lg) var(--r-lg) 0 0;
}
.action-card-icon{
  width:36px;height:36px;border-radius:var(--r-sm);
  display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;
}
.action-card-title{font-size:13px;font-weight:800;letter-spacing:-.01em;color:var(--text)}
.action-card-sub  {font-size:11px;color:var(--text-3);margin-top:2px}
.action-card-body {padding:14px 16px 18px}
.ac-field{margin-bottom:10px}
.ac-field label{
  display:block;font-size:10.5px;font-weight:800;
  text-transform:uppercase;letter-spacing:.07em;color:var(--text-3);margin-bottom:5px;
}
.ac-field input,.ac-field textarea,.ac-field select{
  width:100%;background:var(--surface-2);border:1px solid var(--border-md);
  border-radius:var(--r-sm);padding:9px 12px;font-size:13px;color:var(--text);
  font-family:var(--font);transition:border-color .15s,box-shadow .15s;outline:none;box-sizing:border-box;
}
.ac-field input:focus,.ac-field textarea:focus,.ac-field select:focus{
  border-color:rgba(124,111,255,.5);box-shadow:0 0 0 3px var(--accent-dim);background:var(--surface-3);
}
.ac-field textarea{resize:none;height:72px;line-height:1.5}
.ac-field select option{background:var(--surface);color:var(--text)}
.ac-field-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.ac-field-row .ac-field{margin-bottom:0}
.ac-actions{
  display:flex;gap:8px;flex-wrap:wrap;
  margin-top:14px;padding-top:12px;border-top:1px solid var(--border);padding-bottom:4px;
}
.btn-save{
  flex:1;
  background:linear-gradient(135deg,var(--accent),#7c73ff);
  border:none;border-radius:var(--r-sm);padding:10px 14px;
  font-size:12.5px;font-weight:700;color:white;cursor:pointer;font-family:var(--font);
  transition:opacity .15s,transform .1s,box-shadow .15s;white-space:nowrap;
  box-shadow:0 2px 10px var(--accent-glow);
}
.btn-save:hover  {opacity:.88;box-shadow:0 4px 14px var(--accent-glow)}
.btn-save:active {transform:scale(.97)}
.btn-save:disabled{opacity:.4;cursor:not-allowed;box-shadow:none}
.btn-save-outline{
  flex:1;background:transparent;
  border:1px solid var(--border-md);border-radius:var(--r-sm);
  padding:10px 14px;font-size:12.5px;font-weight:700;color:var(--text-2);
  cursor:pointer;font-family:var(--font);transition:var(--t);white-space:nowrap;
}
.btn-save-outline:hover{border-color:var(--accent);color:var(--accent-2);background:var(--accent-dim)}

/* ── Card sub-components ─────────────────────────────────────── */
.tag-cloud{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.tag-pill{background:var(--accent-dim);color:var(--accent-2);border:1px solid rgba(124,111,255,.2);border-radius:5px;padding:2px 9px;font-size:11.5px;font-weight:600}
.hi-item{display:flex;align-items:flex-start;gap:7px;padding:5px 0;font-size:12.5px;color:var(--text-2);line-height:1.5}
.hi-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);flex-shrink:0;margin-top:5px}
.cat-pill-grid{display:flex;flex-wrap:wrap;gap:6px}
.cat-pill{
  background:var(--surface-2);border:1.5px solid var(--border-md);
  border-radius:var(--r-xs);padding:5px 11px;
  font-size:12px;font-weight:600;color:var(--text-2);cursor:pointer;transition:var(--t);
}
.cat-pill.selected{border-color:var(--accent);background:var(--accent-dim);color:var(--accent-2)}
.name-suggestion{
  background:var(--surface-2);border:1px solid var(--border-md);
  border-radius:var(--r-xs);padding:8px 12px;font-size:13px;font-weight:600;
  cursor:pointer;transition:var(--t);
  display:flex;align-items:center;justify-content:space-between;
}
.name-suggestion:hover{border-color:var(--accent);color:var(--accent-2);background:var(--accent-dim);transform:translateX(2px)}
.name-suggestions{display:flex;flex-direction:column;gap:5px;margin-top:4px}
.cat-item-wrap{margin-bottom:10px;padding:10px;background:var(--surface-2);border-radius:var(--r-sm);border:1px solid var(--border)}

/* ── Coupon card ─────────────────────────────────────────────── */
.coupon-banner{
  background:linear-gradient(135deg,var(--accent-dim),var(--accent-soft));
  border:1.5px dashed rgba(124,111,255,.35);border-radius:var(--r-sm);
  padding:14px 16px 11px;text-align:center;margin-bottom:14px;
  cursor:pointer;transition:var(--t);
}
.coupon-banner:hover{background:linear-gradient(135deg,rgba(124,111,255,.14),rgba(124,115,255,.07));border-color:rgba(124,111,255,.5);transform:scale(1.01)}
.coupon-code-display{font-family:var(--mono);font-size:22px;font-weight:700;color:var(--accent-2);letter-spacing:.08em;line-height:1;margin-bottom:6px}
.coupon-badge{display:inline-block;background:var(--accent-dim);border:1px solid rgba(124,111,255,.25);border-radius:20px;padding:3px 12px;font-size:12px;font-weight:700;color:var(--accent-2);letter-spacing:.02em;transition:var(--t)}
.coupon-copy-hint{font-size:10.5px;color:var(--text-3);margin-top:5px}

/* ── Insights card ───────────────────────────────────────────── */
.insight-section{margin-bottom:12px}
.insight-section h4{font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--text-3);margin-bottom:7px}
.insight-summary-box{font-size:13px;color:var(--text-2);line-height:1.7;margin-bottom:12px;padding:12px;background:var(--surface-2);border-radius:var(--r-sm);border:1px solid var(--border)}

/* ════════════════════════════════════════════════════════════════
   MOBILE / TABLET ACTION DRAWER + FAB
   ════════════════════════════════════════════════════════════════ */

/* ── FAB — floating action button (mobile/tablet only) ────────── */
.action-fab{
  display:none; /* hidden on desktop */
  position:fixed;bottom:24px;right:20px;z-index:800;
  align-items:center;gap:9px;
  background:linear-gradient(135deg,var(--accent),#7c73ff);
  border:none;border-radius:999px;padding:12px 18px 12px 14px;
  color:white;font-size:13px;font-weight:700;font-family:var(--font);
  cursor:pointer;box-shadow:0 6px 24px var(--accent-glow);
  transition:transform .2s cubic-bezier(.34,1.56,.64,1),opacity .2s,box-shadow .2s;
  user-select:none;-webkit-tap-highlight-color:transparent;
}
.action-fab:active{transform:scale(.94)}
.action-fab.hidden{opacity:0;pointer-events:none;transform:scale(.8) translateY(10px)}
.action-fab.visible{opacity:1;pointer-events:all;transform:scale(1) translateY(0);animation:fabPop .35s cubic-bezier(.34,1.56,.64,1) both}
@keyframes fabPop{from{opacity:0;transform:scale(.7) translateY(16px)}to{opacity:1;transform:scale(1) translateY(0)}}
.action-fab-icon{font-size:17px;line-height:1}
.action-fab-label{line-height:1}
.action-fab-badge{
  width:18px;height:18px;border-radius:50%;
  background:#ef4444;color:white;font-size:10px;font-weight:800;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  border:2px solid white;margin-left:2px;
  animation:badgePulse 2s ease-in-out infinite;
}
@keyframes badgePulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.5)}60%{box-shadow:0 0 0 6px rgba(239,68,68,0)}}

/* ── Bottom drawer backdrop ───────────────────────────────────── */
.drawer-backdrop{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);
  z-index:850;opacity:0;transition:opacity .25s ease;
  -webkit-tap-highlight-color:transparent;
}
.drawer-backdrop.open{display:block;opacity:1}
[data-theme="dark"] .drawer-backdrop{background:rgba(0,0,0,.65)}

/* ── Bottom drawer ────────────────────────────────────────────── */
.action-drawer{
  display:none;position:fixed;
  left:0;right:0;bottom:0;z-index:900;
  background:var(--surface);
  border-radius:20px 20px 0 0;
  box-shadow:0 -8px 40px rgba(0,0,0,.25);
  max-height:90vh;
  flex-direction:column;
  overflow:hidden;
  transform:translateY(100%);
  transition:transform .32s cubic-bezier(.32,.72,0,1);
}
.action-drawer.open{transform:translateY(0)}
.drawer-pill{
  width:36px;height:4px;border-radius:2px;
  background:var(--border-md);margin:10px auto 0;flex-shrink:0;
}
.drawer-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px 10px;border-bottom:1px solid var(--border);flex-shrink:0;
}
.drawer-title{
  font-size:14px;font-weight:800;color:var(--text);
  display:flex;align-items:center;gap:8px;
}
.drawer-title-icon{
  width:28px;height:28px;border-radius:8px;
  background:linear-gradient(135deg,var(--accent),#7c73ff);
  display:flex;align-items:center;justify-content:center;font-size:13px;
}
.drawer-close{
  width:30px;height:30px;border-radius:50%;border:none;
  background:var(--surface-2);color:var(--text-2);font-size:14px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:var(--t);-webkit-tap-highlight-color:transparent;
}
.drawer-close:hover{background:var(--surface-3);color:var(--text)}
.drawer-scroll{
  flex:1;overflow-y:auto;padding:14px;
  overscroll-behavior:contain;-webkit-overflow-scrolling:touch;
}
.drawer-scroll::-webkit-scrollbar{width:3px}
.drawer-scroll::-webkit-scrollbar-thumb{background:var(--border-md);border-radius:3px}

/* ── Touch drag for drawer ────────────────────────────────────── */
.drawer-drag-handle{
  padding:6px 0 2px;cursor:grab;flex-shrink:0;
  display:flex;flex-direction:column;align-items:center;
}

/* ── Responsive layout ───────────────────────────────────────── */
@media(max-width:1100px){.ai-root{grid-template-columns:1fr 340px}}

@media(max-width:900px){
  /* Switch to single-column — action panel is in the drawer */
  .ai-root{
    grid-template-columns:1fr;
    height:calc(100vh - 56px - 28px);  /* account for mobile topbar */
    gap:0;
  }
  /* Desktop action panel becomes invisible — drawer takes over */
  .action-panel{display:none!important}
  /* Chat panel fills the whole grid */
  .chat-panel{height:100%;min-height:0}
  /* Show FAB */
  .action-fab{display:flex}
  /* Show drawer */
  .action-drawer{display:flex}
  .content{padding:14px 14px 14px}
}

@media(max-width:648px){
  .ai-root{height:calc(100vh - 56px - 24px)}
  .content{padding:10px 10px 10px}
  .chat-header{padding:11px 14px}
  .chat-header-avatar{width:34px;height:34px;font-size:16px}
  .chat-header-info h2{font-size:12.5px}
  .chat-header-info p{display:none}
  .chat-messages{padding:14px;gap:12px}

@media(max-width:380px){

  .chat-send-btn,.chat-mic-btn-solo{width:40px;height:40px}
  .lang-btn{height:40px;min-width:52px}
}

  <span class="action-fab-label" id="fabLabel">Action Card</span>
  <span class="action-fab-badge">1</span>
</button>

<script>
/* ══════════════════════════════════════════════════════════════
   STATE
══════════════════════════════════════════════════════════════ */
let currentStoreId = '', allProducts = [], allCategories = [];
let conversationHistory = [], isTyping = false, userName = '', _storeSwitching = false;

/* ── Detect mobile/tablet ───────────────────────────────────── */
function isMobileLayout(){ return window.innerWidth <= 900; }

/* ══════════════════════════════════════════════════════════════
   DRAWER — open / close / drag
══════════════════════════════════════════════════════════════ */
let _drawerOpen = false;
let _lastCardAction = null;  // store last rendered action for drawer re-open

function openActionDrawer(){
  const drawer   = document.getElementById('actionDrawer');
  const backdrop = document.getElementById('drawerBackdrop');
  if(!drawer) return;
  drawer.classList.add('open');
  backdrop.classList.add('open');
  document.body.style.overflow = 'hidden';
  _drawerOpen = true;
}

function closeActionDrawer(){
  const drawer   = document.getElementById('actionDrawer');
  const backdrop = document.getElementById('drawerBackdrop');
  if(!drawer) return;
  drawer.classList.remove('open');
  backdrop.classList.remove('open');
  document.body.style.overflow = '';
  _drawerOpen = false;
}

/* Touch drag-to-dismiss */
(function(){
  let startY = 0, curY = 0, dragging = false;
  function onStart(e){
    const handle = document.getElementById('drawerHandle');
    if(!handle) return;
    startY = (e.touches ? e.touches[0].clientY : e.clientY);
    curY = startY; dragging = true;
  }
  function onMove(e){
    if(!dragging) return;
    curY = (e.touches ? e.touches[0].clientY : e.clientY);
    const dy = Math.max(0, curY - startY);
    const drawer = document.getElementById('actionDrawer');
    if(drawer) drawer.style.transform = `translateY(${dy}px)`;
    if(e.cancelable) e.preventDefault();
  }
  function onEnd(){
    if(!dragging) return;
    dragging = false;
    const drawer = document.getElementById('actionDrawer');
    if(!drawer) return;
    const dy = curY - startY;
    drawer.style.transform = '';
    drawer.style.transition = '';
    if(dy > 100) closeActionDrawer();
  }
  document.addEventListener('DOMContentLoaded', ()=>{
    const handle = document.getElementById('drawerHandle');
    if(handle){
      handle.addEventListener('touchstart', onStart, {passive:true});
      handle.addEventListener('touchmove',  onMove,  {passive:false});
      handle.addEventListener('touchend',   onEnd,   {passive:true});
    }
  });
})();

/* Show/hide FAB */
function showFab(icon, label){
  const fab = document.getElementById('actionFab');
  const fabIcon  = document.getElementById('fabIcon');
  const fabLabel = document.getElementById('fabLabel');
  if(!fab) return;
  if(fabIcon)  fabIcon.textContent  = icon  || '📦';
  if(fabLabel) fabLabel.textContent = label || 'Action Card';
  fab.classList.remove('hidden');
  fab.classList.add('visible');
}
function hideFab(){
  const fab = document.getElementById('actionFab');
  if(!fab) return;
  fab.classList.add('hidden');
  fab.classList.remove('visible');
}

/* ══════════════════════════════════════════════════════════════
   STORE SELECTORS
══════════════════════════════════════════════════════════════ */
function buildStoreSel(stores, activeId){
  const opts = stores.map(s=>`<option value="${s._id}"${s._id===activeId?' selected':''}>${s.name}</option>`).join('');
  const desk = document.getElementById('store-selector');
  const mob  = document.getElementById('mob-store-selector');
  if(desk) desk.innerHTML = opts;
  if(mob)  mob.innerHTML  = opts;
}

function onStoreChange(id){
  if(!id || id === currentStoreId) return;
  currentStoreId = id;
  sessionStorage.setItem('ekart_current_store', id);
  ['store-selector','mob-store-selector'].forEach(sid=>{const el=document.getElementById(sid);if(el&&el.value!==id)el.value=id;});
  triggerStoreSwitch();
}

/* ══════════════════════════════════════════════════════════════
   INIT
══════════════════════════════════════════════════════════════ */
window.addEventListener('DOMContentLoaded', async () => {
  const nav = await renderNav('ai-assistant', id => { onStoreChange(id); });
  if(!nav) return;

  currentStoreId = nav.currentStoreId;
  userName       = nav.user?.name || nav.user?.email || 'there';
  if(nav.stores && nav.stores.length) buildStoreSel(nav.stores, currentStoreId);

  if(currentStoreId) await loadStoreData();
  setupInput();
  addWelcomeMessage();
  showQuickChips(getInitialChips());
  initVoice();

  document.getElementById('page-content').style.display = '';
  dismissSkeleton();
});

/* ══════════════════════════════════════════════════════════════
   STORE SWITCH
══════════════════════════════════════════════════════════════ */
async function triggerStoreSwitch(){
  if(_storeSwitching) return;
  _storeSwitching = true;
  const overlay     = document.getElementById('storeSwitchOverlay');
  const msgs        = document.getElementById('chatMessages');
  const chips       = document.getElementById('quickChips');
  const inputWrap   = document.querySelector('.chat-input-wrap');
  const actionPanel = document.getElementById('actionPanel');
  overlay?.classList.add('active');
  msgs?.classList.add('store-switching');
  chips?.classList.add('store-switching');
  inputWrap?.classList.add('store-switching');
  actionPanel?.classList.add('store-switching');
  await loadStoreData();
  await new Promise(r=>setTimeout(r,320));
  conversationHistory = [];
  _lastCardAction = null;
  hideFab();
  closeActionDrawer();
  if(msgs){
    msgs.style.transition='opacity .18s ease'; msgs.style.opacity='0';
    await new Promise(r=>setTimeout(r,200));
    msgs.innerHTML=''; addWelcomeMessage(); msgs.style.opacity='1';
  }
  showQuickChips(getInitialChips());
  // Reset desktop panel
  if(actionPanel){
    actionPanel.innerHTML=`<div class="action-empty" id="actionEmpty"><div class="action-empty-icon">💬</div><h3>Start a conversation</h3><p>As you chat with the AI, smart action cards will appear here — ready for you to review and save with one click.</p></div>`;
  }
  // Reset drawer
  const drawerScroll = document.getElementById('drawerScroll');
  if(drawerScroll) drawerScroll.innerHTML = '';
  overlay?.classList.remove('active');
  msgs?.classList.remove('store-switching');
  chips?.classList.remove('store-switching');
  inputWrap?.classList.remove('store-switching');
  actionPanel?.classList.remove('store-switching');
  _storeSwitching = false;
}

async function loadStoreData(){
  if(!currentStoreId) return;
  try{
    [allProducts, allCategories] = await Promise.all([
      apiFetch(`/stores/${currentStoreId}/products`).catch(()=>[]),
      apiFetch(`/stores/${currentStoreId}/categories`).catch(()=>[])
    ]);
  }catch{}
}

/* ══════════════════════════════════════════════════════════════
   WELCOME + CHIPS
══════════════════════════════════════════════════════════════ */
function addWelcomeMessage(){
  const first = (userName||'there').split(' ')[0];
  addAIMessage(`Hi ${first}! 👋 I'm your eKart AI assistant. I can help you with:\n\n• **Add products** — describe a product and I'll fill in the details\n• **Create categories** — organise your catalogue effortlessly\n• **Store setup** — name, description, and category ideas\n• **Coupons & discounts** — create offers for your customers\n• **Sales insights** — understand your store performance\n\nYou can talk to me in any language — just type naturally!`);
}
function getInitialChips(){ return ['➕ Add a product','🗂️ Create a category','🏷️ Make a coupon','🏪 Setup my store','📊 Analyse my sales']; }
function showQuickChips(chips){ document.getElementById('quickChips').innerHTML=chips.map(c=>`<span class="chip" onclick="chipClick(this)">${c}</span>`).join(''); }
function chipClick(el){ document.getElementById('chatInput').value=el.textContent.trim(); sendMessage(); }

/* ══════════════════════════════════════════════════════════════
   INPUT
══════════════════════════════════════════════════════════════ */
function setupInput(){
  const inp=document.getElementById('chatInput');
  inp.addEventListener('keydown',e=>{ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();} });
  inp.addEventListener('input',()=>{ inp.style.height='auto'; inp.style.height=Math.min(inp.scrollHeight,120)+'px'; });
}

/* ══════════════════════════════════════════════════════════════
   SEND + CLAUDE API
══════════════════════════════════════════════════════════════ */
async function sendMessage(){
  if(_recActive) _stopVoice(false);
  if(_storeSwitching) return;
  const inp=document.getElementById('chatInput');
  const text=inp.value.trim();
  if(!text||isTyping) return;
  inp.value=''; inp.style.height='auto';
  document.getElementById('quickChips').innerHTML='';
  document.getElementById('sendBtn').disabled=true;
  addUserMessage(text);
  conversationHistory.push({role:'user',content:text});
  showTyping(); isTyping=true;
  try{
    const response=await callClaudeAPI(conversationHistory);
    hideTyping();
    const{message,action,chips}=response;
    conversationHistory.push({role:'assistant',content:JSON.stringify(response)});
    addAIMessage(message);
    if(action){
      if(action.data) Object.keys(action.data).forEach(k=>{const v=action.data[k];if(v!==null&&v!==undefined&&!Array.isArray(v)&&typeof v==='object')action.data[k]=JSON.stringify(v);});
      renderActionCard(action);
    }
    if(chips&&chips.length) showQuickChips(chips);
  }catch(err){hideTyping();addAIMessage('Sorry, something went wrong. Please try again! 😅');console.error(err);}
  isTyping=false;
  document.getElementById('sendBtn').disabled=false;
}

async function callClaudeAPI(history){
  const systemPrompt=buildSystemPrompt();
  const lastMsg=history[history.length-1]?.content||'';
  const res=await apiFetch('/ai/website-builder',{method:'POST',body:JSON.stringify({message:lastMsg,history:history.slice(0,-1).slice(-12),system_prompt:systemPrompt,site_state:{storeId:currentStoreId}})});
  const raw=res.reply||res.content||'';
  let parsed=null;
  try{parsed=JSON.parse(raw.trim());}catch{}
  if(!parsed){const m=raw.match(/```(?:json)?\s*([\s\S]*?)```/);if(m)try{parsed=JSON.parse(m[1].trim());}catch{}}
  if(!parsed){const si=raw.indexOf('{'),ei=raw.lastIndexOf('}');if(si!==-1&&ei>si)try{parsed=JSON.parse(raw.slice(si,ei+1));}catch{}}
  if(!parsed||parsed.message===undefined) return{message:raw||'Something went wrong, please try again.',chips:[],action:null};
  return parsed;
}

function buildSystemPrompt(){
  const cats  = allCategories.map(c=>c.name).join(', ')||'None yet';
  const prods = allProducts.slice(0,10).map(p=>p.name).join(', ')||'None yet';
  return `You are an eKart AI assistant embedded in an e-commerce merchant dashboard.
The merchant is talking to you to manage their store. You MUST respond in the SAME LANGUAGE the user writes in.

Store context:
- Store ID: ${currentStoreId||'not selected'}
- Existing categories: ${cats}
- Recent products: ${prods}

Your job is to understand what the merchant wants and respond with a JSON object (NO markdown, NO code fences, pure JSON):

{
  "message": "Your friendly conversational reply in the user's language",
  "chips": ["Follow-up suggestion 1", "Follow-up suggestion 2", "Follow-up suggestion 3"],
  "action": null OR one of the action objects below
}

CRITICAL RULE — ONLY PRE-FILL WHAT THE USER EXPLICITLY PROVIDED:
- If the user says "add a product" with NO details → set name, description, tags, highlights all to "" (empty string) and price to 0. Ask them what the product is.
- If the user says "add a product called Blue T-Shirt for ₹499" → fill name="Blue T-Shirt", price=499, leave description="" and tags=[] since they didn't mention those.
- If the user provides a description → fill it. If not → leave it "".
- NEVER invent/hallucinate product names, descriptions, prices, tags or highlights the user did not mention.
- The card is a form for the merchant to fill in — only pre-populate what they told you.

ACTION TYPES:
1. ADD/CREATE PRODUCT:
{ "type": "product", "title": "Card title", "data": { "name": "only if user said it, else empty", "category": "only if user said it, else empty", "price": 0, "description": "only if user described it, else empty", "tags": [], "highlights": [], "sku": "" } }
2. ADD/CREATE CATEGORY:
{ "type": "category", "title": "Card title", "data": { "categories": [{ "name": "...", "description": "", "icon": "emoji" }] } }
3. STORE SETUP:
{ "type": "store", "title": "Card title", "data": { "name_suggestions": ["..."], "description": "...", "tagline": "...", "categories": ["..."], "tips": ["..."] } }
4. COUPON / DISCOUNT — IMPORTANT: discount_type must be exactly "percent" or "flat":
{ "type": "coupon", "title": "Card title", "data": { "code": "SAVE20", "discount_type": "percent", "discount_value": 20, "min_order": 0, "description": "...", "valid_days": 30 } }
5. SALES INSIGHTS:
{ "type": "insights", "title": "Card title", "data": { "summary": "...", "wins": ["..."], "improvements": ["..."], "actions": [{ "label": "...", "priority": "high|medium|low" }] } }

If the user is just chatting, set action to null.
Always generate 2-4 relevant follow-up chips in the user's language.
Be warm, concise, helpful. Use emojis sparingly.`;
}

function addUserMessage(text){ const initials=(userName||'U').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2); appendMessage('user',text,initials); }
function addAIMessage(text){ if(text===null||text===undefined)text=''; if(typeof text!=='string')text=JSON.stringify(text); const html=text.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>'); appendMessage('ai',html,'🤖',true); }
function appendMessage(role,content,avatarContent,isHTML=false){ const wrap=document.getElementById('chatMessages'); const div=document.createElement('div'); div.className=`msg ${role}`; div.innerHTML=`<div class="msg-avatar">${avatarContent}</div><div class="msg-bubble">${isHTML?content:escHtml(content)}</div>`; wrap.appendChild(div); scrollChat(); }
function showTyping(){ const wrap=document.getElementById('chatMessages'); const div=document.createElement('div'); div.className='msg ai'; div.id='typingMsg'; div.innerHTML=`<div class="msg-avatar">🤖</div><div class="msg-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`; wrap.appendChild(div); scrollChat(); }
function hideTyping(){ document.getElementById('typingMsg')?.remove(); }
function scrollChat(){ const wrap=document.getElementById('chatMessages'); setTimeout(()=>{wrap.scrollTop=wrap.scrollHeight;},50); }
function escHtml(s){ if(s===null||s===undefined)return''; if(typeof s!=='string')s=String(s); return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }
function escAttr(s){ if(s===null||s===undefined)return''; if(typeof s!=='string')s=String(s); return s.replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* ══════════════════════════════════════════════════════════════
   ACTION CARDS — unified renderer for desktop + mobile
══════════════════════════════════════════════════════════════ */
const TYPE_META = {
  product:  { icon:'📦', fabIcon:'📦', label:'Add New Product',  color:'var(--accent-dim)' },
  category: { icon:'🗂️', fabIcon:'🗂️', label:'New Categories',   color:'rgba(59,130,246,.1)' },
  store:    { icon:'🏪', fabIcon:'🏪', label:'Store Setup',       color:'var(--amber-dim)' },
  coupon:   { icon:'🏷️', fabIcon:'🏷️', label:'New Coupon',        color:'var(--green-dim)' },
  insights: { icon:'📊', fabIcon:'📊', label:'Sales Insights',    color:'var(--amber-dim)' },
};

function renderActionCard(action){
  if(!action || !action.type) return;
  _lastCardAction = action;

  const id = 'ac_' + Date.now();
  const meta = TYPE_META[action.type] || { icon:'📦', fabIcon:'📦', label:'Action Card', color:'var(--accent-dim)' };

  let cardHTML = '';
  switch(action.type){
    case 'product':  cardHTML = buildProductCard(id, action);  break;
    case 'category': cardHTML = buildCategoryCard(id, action); break;
    case 'store':    cardHTML = buildStoreCard(id, action);    break;
    case 'coupon':   cardHTML = buildCouponCard(id, action);   break;
    case 'insights': cardHTML = buildInsightsCard(id, action); break;
    default: return;
  }

  if(isMobileLayout()){
    /* ── MOBILE/TABLET: inject into drawer ── */
    const drawerScroll = document.getElementById('drawerScroll');
    const drawerTitle  = document.getElementById('drawerTitle');
    if(!drawerScroll) return;

    // Update drawer title
    if(drawerTitle) drawerTitle.textContent = action.title || meta.label;

    // Animate out existing card
    const existing = drawerScroll.querySelector('.action-card');
    if(existing){
      existing.style.transition = 'opacity .15s,transform .15s';
      existing.style.opacity = '0';
      existing.style.transform = 'translateX(20px)';
      setTimeout(()=>existing.remove(), 160);
    }

    setTimeout(()=>{
      const card = document.createElement('div');
      card.className = 'action-card';
      card.id = id;
      card.innerHTML = cardHTML;
      drawerScroll.innerHTML = '';
      drawerScroll.appendChild(card);
      drawerScroll.scrollTop = 0;
      if(action.type === 'coupon') updateCouponBanner(id);
    }, existing ? 170 : 0);

    // Show FAB + auto-open drawer
    showFab(meta.fabIcon, action.title || meta.label);
    setTimeout(()=> openActionDrawer(), existing ? 200 : 80);

  } else {
    /* ── DESKTOP: inject into right panel ── */
    const panel = document.getElementById('actionPanel');
    document.getElementById('actionEmpty')?.remove();
    const existing = panel.querySelector('.action-card');
    if(existing){
      existing.style.transition = 'opacity .15s,transform .15s';
      existing.style.opacity = '0';
      existing.style.transform = 'translateX(20px)';
      setTimeout(()=>existing.remove(), 160);
    }
    setTimeout(()=>{
      const card = document.createElement('div');
      card.className = 'action-card';
      card.id = id;
      card.innerHTML = cardHTML;
      panel.appendChild(card);
      panel.scrollTop = 0;
      if(action.type === 'coupon') updateCouponBanner(id);
    }, existing ? 170 : 0);
  }
}

/* Re-render when screen resizes across 900px breakpoint */
let _lastWidth = window.innerWidth;
window.addEventListener('resize', ()=>{
  const nowMobile = window.innerWidth <= 900;
  const wasMobile = _lastWidth <= 900;
  _lastWidth = window.innerWidth;
  if(nowMobile === wasMobile) return;
  // Breakpoint crossed — re-render last card in correct location
  if(_lastCardAction) renderActionCard(_lastCardAction);
  if(!nowMobile){ closeActionDrawer(); hideFab(); }
});

  const name=document.getElementById(`${id}_name`).value.trim();
  if(!name){showCardMsg(msg,'Enter a product name','error');btn.disabled=false;btn.innerHTML='<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg> Save Product';return;}
  if(!currentStoreId){showCardMsg(msg,'Select a store first','error');btn.disabled=false;btn.innerHTML='<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg> Save Product';return;}
  const catEl=document.getElementById(`${id}_cat`);
  const payload={name,category_id:catEl?catEl.value:'',price:parseFloat(document.getElementById(`${id}_price`).value)||0,description:document.getElementById(`${id}_desc`).value.trim(),tags:document.getElementById(`${id}_tags`).value.split(',').map(t=>t.trim()).filter(Boolean)};
  try{

    showCardMsg(msg,'✅ Product saved successfully!','success'); btn.innerHTML='<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg> Saved!';
    toast('Product saved!','success');
    allProducts=await apiFetch(`/stores/${currentStoreId}/products`).catch(()=>allProducts);
  }catch(e){showCardMsg(msg,'❌ '+e.message,'error');btn.disabled=false;btn.innerHTML='<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg> Save Product';}
}

async function saveCategories(id,count){
  const btn=document.querySelector(`#${id} .btn-save`),msg=document.getElementById(`${id}_msg`);
  btn.disabled=true; btn.innerHTML='<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="animation:storeSpin .7s linear infinite"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg> Saving…';
  if(!currentStoreId){showCardMsg(msg,'Select a store first','error');btn.disabled=false;btn.innerHTML='<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg> Save All';return;}
  let saved=0;
  for(let i=0;i<count;i++){
    const nameEl=document.getElementById(`${id}_cat${i}_name`); if(!nameEl)continue;
    const name=nameEl.value.trim(); if(!name)continue;
    try{await apiFetch(`/stores/${currentStoreId}/categories`,{method:'POST',body:JSON.stringify({name,icon:document.getElementById(`${id}_cat${i}_icon`)?.value||'📦',description:document.getElementById(`${id}_cat${i}_desc`)?.value.trim()||''})});saved++;}catch{}
  }
  if(saved>0){showCardMsg(msg,`✅ ${saved} categor${saved===1?'y':'ies'} saved!`,'success');btn.innerHTML='<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg> Saved!';toast(`${saved} ${saved===1?'category':'categories'} saved!`,'success');allCategories=await apiFetch(`/stores/${currentStoreId}/categories`).catch(()=>allCategories);}
  else{showCardMsg(msg,'❌ Could not save categories','error');btn.disabled=false;btn.innerHTML='<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg> Save All';}
}

async function saveStore(id){
  const btn=document.querySelector(`#${id} .btn-save`),msg=document.getElementById(`${id}_msg`);
  btn.disabled=true; btn.innerHTML='<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="animation:storeSpin .7s linear infinite"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg> Saving…';

  if(!name&&!desc){showCardMsg(msg,'Fill in at least one field','error');btn.disabled=false;btn.innerHTML='<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg> Update Store';return;}
  if(!currentStoreId){showCardMsg(msg,'Select a store first','error');btn.disabled=false;btn.innerHTML='<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg> Update Store';return;}
  try{
    const payload={};if(name)payload.name=name;if(desc)payload.description=desc;if(tagline)payload.tagline=tagline;
    await apiFetch(`/stores/${currentStoreId}`,{method:'PUT',body:JSON.stringify(payload)});
    showCardMsg(msg,'✅ Store updated!','success');btn.innerHTML='<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg> Saved!';toast('Store updated!','success');await loadStoreData();
  }catch(e){showCardMsg(msg,'❌ '+e.message,'error');btn.disabled=false;btn.innerHTML='<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg> Update Store';}
}

async function saveCoupon(id){
  const btn=document.querySelector(`#${id} .btn-save`),msg=document.getElementById(`${id}_msg`);
  btn.disabled=true; btn.innerHTML='<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="animation:storeSpin .7s linear infinite"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg> Creating…';
  const code=(document.getElementById(`${id}_code`)?.value||'').trim().toUpperCase();
  const type=document.getElementById(`${id}_dtype`)?.value||'percent';
  const discountVal=parseFloat(document.getElementById(`${id}_dval`)?.value);
  const minOrder=parseFloat(document.getElementById(`${id}_minord`)?.value)||0;
  const validDays=parseInt(document.getElementById(`${id}_days`)?.value)||30;
  const description=document.getElementById(`${id}_cdesc`)?.value.trim()||'';
  if(!code){showCardMsg(msg,'❌ Enter a coupon code','error');btn.disabled=false;btn.innerHTML='<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg> Create Coupon';return;}
  if(!['percent','flat'].includes(type)){showCardMsg(msg,'❌ Invalid discount type','error');btn.disabled=false;btn.innerHTML='<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg> Create Coupon';return;}
  if(isNaN(discountVal)||discountVal<=0){showCardMsg(msg,'❌ Enter a valid discount value greater than 0','error');btn.disabled=false;btn.innerHTML='<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg> Create Coupon';return;}
  if(!currentStoreId){showCardMsg(msg,'❌ Select a store first','error');btn.disabled=false;btn.innerHTML='<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg> Create Coupon';return;}
  const expiresAt=new Date(Date.now()+validDays*24*60*60*1000).toISOString();
  try{
    await apiFetch(`/stores/${currentStoreId}/coupons`,{method:'POST',body:JSON.stringify({code,type,value:discountVal,min_order:minOrder,expires_at:expiresAt,description})});
    showCardMsg(msg,'✅ Coupon created successfully!','success');btn.innerHTML='<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg> Created!';toast('Coupon created!','success');
  }catch(e){showCardMsg(msg,'❌ '+(e.message||'Failed to create coupon'),'error');btn.disabled=false;btn.innerHTML='<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg> Create Coupon';}
}

function exportInsights(id){ const card=document.getElementById(id);if(!card)return;navigator.clipboard.writeText(card.querySelector('.action-card-body').innerText).then(()=>toast('Copied to clipboard!','success')); }

/* ══════════════════════════════════════════════════════════════
   CARD HELPERS
══════════════════════════════════════════════════════════════ */
function showCardMsg(el,text,type){ if(!el)return; const ok=type==='success'; const s=ok?'background:var(--green-dim);border:1px solid var(--green-border);color:var(--green);':'background:var(--red-dim);border:1px solid rgba(224,82,82,.25);color:var(--red);'; el.innerHTML=`<div style="${s}border-radius:var(--r-sm);padding:9px 12px;font-size:12.5px;font-weight:600;margin-top:10px;">${escHtml(text)}</div>`; }
function dismissCard(id){
  const el=document.getElementById(id);
  if(!el)return;
  el.style.opacity='0';el.style.transform='translateX(20px)';el.style.transition='all .25s';
  setTimeout(()=>{
    el.remove();
    // On mobile, close drawer and hide FAB when dismissed
    if(isMobileLayout()){ closeActionDrawer(); hideFab(); _lastCardAction=null; }
    else{
      // Restore empty state on desktop if no more cards
      const panel=document.getElementById('actionPanel');
      if(panel&&!panel.querySelector('.action-card')){
        panel.innerHTML=`<div class="action-empty" id="actionEmpty"><div class="action-empty-icon">💬</div><h3>Start a conversation</h3><p>As you chat with the AI, smart action cards will appear here — ready for you to review and save with one click.</p></div>`;
      }
    }
  },250);
}
function pickStoreName(id,el){ const name=el.firstChild.textContent.trim(); document.getElementById(`${id}_sname`).value=name; document.querySelectorAll(`#${id} .name-suggestion`).forEach(n=>{n.style.borderColor='';n.style.color='';n.style.background='';}); el.style.borderColor='var(--accent)';el.style.color='var(--accent-2)';el.style.background='var(--accent-dim)'; }
function toggleCat(el){ el.classList.toggle('selected'); }
function copyCoupon(id){ const code=document.getElementById(`${id}_code`)?.value; if(code) navigator.clipboard.writeText(code.toUpperCase()).then(()=>toast('Coupon code copied!','success')); }

/* ══════════════════════════════════════════════════════════════
   VOICE ENGINE
══════════════════════════════════════════════════════════════ */
const VOICE_LANGS=[
  {code:'en-IN',flag:'🇮🇳',label:'English (India)'},{code:'ta-IN',flag:'🇮🇳',label:'Tamil'},
  {code:'hi-IN',flag:'🇮🇳',label:'Hindi'},{code:'te-IN',flag:'🇮🇳',label:'Telugu'},
  {code:'kn-IN',flag:'🇮🇳',label:'Kannada'},{code:'ml-IN',flag:'🇮🇳',label:'Malayalam'},
  {code:'mr-IN',flag:'🇮🇳',label:'Marathi'},{code:'bn-IN',flag:'🇮🇳',label:'Bengali'},
  {code:'gu-IN',flag:'🇮🇳',label:'Gujarati'},{code:'pa-IN',flag:'🇮🇳',label:'Punjabi'},
  {sep:true},
  {code:'en-US',flag:'🇺🇸',label:'English (US)'},{code:'en-GB',flag:'🇬🇧',label:'English (UK)'},
  {code:'ar-SA',flag:'🇸🇦',label:'Arabic'},{code:'zh-CN',flag:'🇨🇳',label:'Chinese'},
  {code:'fr-FR',flag:'🇫🇷',label:'French'},{code:'de-DE',flag:'🇩🇪',label:'German'},
];
let _rec=null,_recActive=false,_finalText='',_idleTimer=null,_silTimer=null;
let _voiceLang=localStorage.getItem('ekart_voice_lang')||'en-IN',_ddOpen=false,_interimText='';

function initVoice(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  const mic=document.getElementById('micBtn'); if(!mic)return;
  if(!SR){mic.disabled=true;mic.title='Voice needs Chrome or Edge';mic.style.opacity='0.3';return;}
  const dd=document.getElementById('langDropdown');
  if(dd) dd.innerHTML=`<div class="lang-dd-head">Voice Language</div>${VOICE_LANGS.map(l=>l.sep?`<div class="lang-dd-sep"></div>`:`<div class="lang-dd-item ${l.code===_voiceLang?'active':''}" onclick="selectVoiceLang('${l.code}',this)"><span class="dd-flag">${l.flag}</span><span class="dd-name">${l.label}</span><span class="dd-check">✓</span></div>`).join('')}`;
  _syncLangBtn();
  document.addEventListener('click',e=>{if(_ddOpen&&!e.target.closest('#langWrap'))_closeLangDD();});
}
function toggleLangDD(){_ddOpen?_closeLangDD():_openLangDD();}
function _openLangDD(){document.getElementById('langDropdown')?.classList.add('open');document.getElementById('langBtn')?.classList.add('open');_ddOpen=true;}
function _closeLangDD(){document.getElementById('langDropdown')?.classList.remove('open');document.getElementById('langBtn')?.classList.remove('open');_ddOpen=false;}
function selectVoiceLang(code,el){_voiceLang=code;localStorage.setItem('ekart_voice_lang',code);document.querySelectorAll('.lang-dd-item').forEach(x=>x.classList.remove('active'));if(el)el.classList.add('active');_syncLangBtn();_closeLangDD();if(_recActive){_stopRecognition();setTimeout(_spawnRec,150);}}
function _syncLangBtn(){const found=VOICE_LANGS.find(l=>l.code===_voiceLang);const flag=document.getElementById('lbFlag'),code=document.getElementById('lbCode');if(flag&&found)flag.textContent=found.flag;if(code&&found)code.textContent=found.code.split('-')[0].toUpperCase();}
function toggleVoice(){const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){addAIMessage('Voice input needs Chrome or Edge browser 🎙');return;}_recActive?_stopVoice(true):_startVoice();}
function _startVoice(){if(_recActive)return;_recActive=true;_finalText='';const inp=document.getElementById('chatInput');inp.value='';inp.classList.add('listening');_autoH(inp);_setMicUI(true);_idleTimer=setTimeout(()=>{if(_recActive&&!_finalText.trim()){_stopVoice(false);const i=document.getElementById('chatInput');if(i){i.placeholder='💬 No speech detected — try again';setTimeout(()=>{i.placeholder='Type or speak your message…';},3000);}}},10000);_spawnRec();}
function _spawnRec(){if(!_recActive)return;const SR=window.SpeechRecognition||window.webkitSpeechRecognition;_rec=new SR();_rec.continuous=false;_rec.interimResults=true;_rec.maxAlternatives=1;_rec.lang=_voiceLang;_interimText='';const inp=document.getElementById('chatInput');_rec.onresult=(e)=>{_clearSil();_clearIdle();let interim='';for(let i=e.resultIndex;i<e.results.length;i++){const t=e.results[i][0].transcript;if(e.results[i].isFinal){_finalText+=t+' ';_interimText='';}else interim+=t;}_interimText=interim;if(inp){inp.value=(_finalText+_interimText).trimStart();inp.placeholder='';_autoH(inp);inp.scrollTop=inp.scrollHeight;}_silTimer=setTimeout(()=>{if(_recActive&&_finalText.trim())_stopVoice(true);},10000);};_rec.onerror=(e)=>{if(e.error==='not-allowed'||e.error==='service-not-allowed'){addAIMessage('🔴 Mic access denied. Please allow microphone in browser settings.');_stopVoice(false);return;}if(e.error==='aborted')return;if(e.error==='no-speech'){if(_recActive)setTimeout(_spawnRec,100);return;}console.warn('[Voice]',e.error);};_rec.onend=()=>{_interimText='';if(_recActive)setTimeout(_spawnRec,100);};try{_rec.start();}catch(err){console.warn('[Voice] start:',err.message);}}
function _stopRecognition(){try{_rec?.stop();}catch(_){}; _rec=null;}
function _stopVoice(andSend){_recActive=false;_clearSil();_clearIdle();_stopRecognition();const inp=document.getElementById('chatInput');_interimText='';if(inp){inp.classList.remove('listening');inp.placeholder='Type or speak your message…';inp.value=_finalText.trim();_autoH(inp);}_setMicUI(false);if(andSend&&_finalText.trim())setTimeout(sendMessage,100);}
function _clearSil(){if(_silTimer){clearTimeout(_silTimer);_silTimer=null;}}
function _clearIdle(){if(_idleTimer){clearTimeout(_idleTimer);_idleTimer=null;}}
function _setMicUI(on){const btn=document.getElementById('micBtn'),ico=document.getElementById('micIcon'),langBtn=document.getElementById('langBtn');if(!btn)return;btn.classList.toggle('recording',on);if(ico)ico.textContent=on?'⏹':'🎙';btn.title=on?'Recording — click to stop & send':'Voice input';if(langBtn)langBtn.classList.toggle('recording',on);}
function _autoH(el){if(!el)return;el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';}
</script>
